# This workflow runs SonarCloud analysis for PRs opened from forks.
# Fork PRs cannot access secrets via pull_request events, so this workflow
# is triggered by workflow_run after "Sonar Fork Reports" completes.
#
# IMPORTANT: This workflow runs from the default branch and has access to secrets.
# It must NEVER execute any code from the fork — only download artifacts and run the scanner.
# See: https://securitylab.github.com/research/github-actions-preventing-pwn-requests

name: SonarCloud Fork

on:
  workflow_run:
    workflows: ["Sonar Fork Reports"]
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  external-fork-scan:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}
    permissions:
      actions: read
      checks: write
      contents: read
      pull-requests: read
    steps:
      - name: Download PR metadata artifact
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          name: sonar-pr-metadata
          path: ./.sonar-pr

      - name: Read PR metadata
        id: metadata
        run: |
          echo "number=$(jq -r '.number' ./.sonar-pr/pr-metadata.json)" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(jq -r '.head_ref' ./.sonar-pr/pr-metadata.json)" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(jq -r '.head_sha' ./.sonar-pr/pr-metadata.json)" >> "$GITHUB_OUTPUT"
          echo "base_ref=$(jq -r '.base_ref' ./.sonar-pr/pr-metadata.json)" >> "$GITHUB_OUTPUT"

      - name: Checkout default branch (for workflow scripts only)
        uses: actions/checkout@v6
        with:
          ref: develop
          sparse-checkout: .github/workflows/scripts
          path: ./.default-branch

      - name: Copy workflow scripts to safe location
        run: cp -r ./.default-branch/.github/workflows/scripts /tmp/workflow-scripts

      - name: Create in-progress PR check run
        id: check
        uses: actions/github-script@v9
        env:
          HEAD_SHA: ${{ steps.metadata.outputs.head_sha }}
        with:
          result-encoding: string
          script: |
            const script = require('/tmp/workflow-scripts/create-check-run.js');
            return await script({ github, context });

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/pull/${{ steps.metadata.outputs.number }}/head

      - name: Download ESLint report artifact
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          name: sonar-eslint-report
          path: .

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          name: sonar-coverage-lcov
          path: ./coverage

      - name: Fetch PR base branch
        run: git fetch origin ${{ steps.metadata.outputs.base_ref }}:${{ steps.metadata.outputs.base_ref }}

      - name: ScanCloud PR Scan
        uses: sonarsource/sonarqube-scan-action@v8.0.0
        with:
          args: >
            -Dsonar.pullrequest.key=${{ steps.metadata.outputs.number }}
            -Dsonar.pullrequest.branch=${{ steps.metadata.outputs.head_ref }}
            -Dsonar.pullrequest.base=${{ steps.metadata.outputs.base_ref }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: Complete PR check run
        if: always()
        uses: actions/github-script@v9
        env:
          JOB_STATUS: ${{ job.status }}
          CHECK_RUN_ID: ${{ steps.check.outputs.result }}
        with:
          script: |
            const script = require('/tmp/workflow-scripts/update-check-run-status.js');
            await script({ github, context });
