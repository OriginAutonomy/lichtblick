name: CI

on:
  push:
    branches: [develop, main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ${{ matrix.os }}

    # Run each command in parallel with the same setup steps.
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        config:
          # Specify names so that the GitHub branch protection settings for
          # required checks don't need to change if we ever change the commands used.
          - name: lint
            command: |
              # lint steps
              set -x
              yarn license-check
              yarn dedupe --check
              yarn run tsc --noEmit # typecheck files that are not included by webpack or package builds
              yarn run lint:ci
              yarn run lint:unused-exports
              yarn run lint:dependencies
          - name: packages
            command: yarn run build:packages
          - name: web
            command: yarn run web:build:prod
          - name: build benchmark
            command: yarn run benchmark:build:prod
          - name: test
            command: yarn run test --maxWorkers=100%
        include:
          - os: windows-latest
            config:
              name: packages
              command: echo complete

    name: ${{ matrix.config.name }} (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: corepack enable yarn

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: |
            .yarn/cache
            **/node_modules
          key: v5-${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: v5-${{ runner.os }}-yarn-

      - run: yarn install --immutable

      - run: ${{ matrix.config.command }}

  e2e-web:
    runs-on: ubuntu-latest

    name: e2e-web (ubuntu-latest)

    env:
      TZ: Europe/Lisbon

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: corepack enable yarn

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: |
            .yarn/cache
            **/node_modules
          key: v5-${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: v5-${{ runner.os }}-yarn-

      - run: yarn install --immutable

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Web tests
        run: yarn test:e2e:web:ci

      - name: Upload Web E2E Test Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-web-reports
          path: e2e/reports/web/
          retention-days: 7
          if-no-files-found: warn

  # Merge reports from all shards and generate summary
  e2e-report:
    if: always()
    needs: [e2e-web]
    runs-on: ubuntu-latest

    name: e2e-report (merge all reports)

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: corepack enable yarn

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: |
            .yarn/cache
            **/node_modules
          key: v5-${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: v5-${{ runner.os }}-yarn-

      - run: yarn install --immutable

      - name: Download web reports
        uses: actions/download-artifact@v8
        with:
          name: e2e-web-reports
          path: e2e/reports/web
        continue-on-error: true

      - name: Generate E2E Test Summary
        run: |
          echo "Generating E2E test summary from merged reports..."
          yarn ts-node e2e/ci-helpers/generate-test-summary.ts >> $GITHUB_STEP_SUMMARY

      - name: Upload Merged E2E Test Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-reports-merged
          path: |
            e2e/reports/
            playwright-report/
          retention-days: 7
